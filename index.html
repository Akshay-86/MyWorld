<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My World Simulation</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="loading-screen">
      <div class="loader-content">
        <div class="tree-animation">
          <div class="trunk"></div>
          <div class="canopy c1"></div>
          <div class="canopy c2"></div>
          <div class="canopy c3"></div>
        </div>
        <h2>Growing Your World</h2>
        <p class="loader-sub">Planting trees, carving paths, building homes...</p>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="load-progress"></div>
        </div>
        <p class="loader-hint">Use <b>WASD</b> or <b>Arrow Keys</b> to explore &bull; <b>Scroll</b> to zoom &bull; <b>Drag</b> to rotate</p>
      </div>
    </div>
    <div id="ui-overlay">
      <h1>My World</h1>
      <p id="status-text">Explore the infinite forest</p>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
